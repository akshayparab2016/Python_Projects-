<!doctype html>
<html>
  <head>
    <title>Flask ToDo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body style="background: #928dab">
    <div class="container mt-5">
      <h2 class="text-center mb-4">📝 ToDo List</h2>

      <!-- Add Task Form -->
      <form action="/add" method="POST" class="d-flex mb-4">
        <input
          type="text"
          name="task"
          class="form-control me-2"
          placeholder="Enter task"
          required
        />
        <button class="btn btn-primary">Add</button>
      </form>

      <!-- Flash Messages -->
      {% with messages = get_flashed_messages(with_categories=true) %} {% for
      category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show">
        {{ message }}
        <button class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %} {% endwith %}

      <!-- Task List -->
      <h4 class="mb-4">Your Todos</h4>
      <ul class="list-group">
        {% for task in tasks %}
        <li
          class="list-group-item d-flex justify-content-between align-items-center"
        >
          <span
            class="{% if task.completed %}text-decoration-line-through text-muted{% endif %}"
          >
            {{ task.content }}
          </span>

          <div>
            <a href="/complete/{{ task.id }}" class="btn btn-success btn-sm"
              >✅</a
            >
            <a href="/edit/{{ task.id }}" class="btn btn-warning btn-sm">✎</a>
            <a href="/delete/{{ task.id }}" class="btn btn-danger btn-sm">✕</a>
          </div>
        </li>
        {% endfor %}
      </ul>
    </div>

    <script>
      setTimeout(function () {
        let alerts = document.querySelectorAll(".alert");
        alerts.forEach(function (alert) {
          alert.style.display = "none";
        });
      }, 3000);
    </script>
  </body>
</html>
