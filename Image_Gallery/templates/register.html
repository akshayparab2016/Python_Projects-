{% extends "base.html" %} {% block content %}

<h3 style="color: white">Register</h3>

<form method="POST">
  <input
    class="form-control mb-3"
    name="username"
    placeholder="Username"
    required
  />

  <input
    class="form-control mb-3"
    name="password"
    placeholder="Password"
    required
  />

  <button class="btn btn-success">Register</button>
</form>
<br /><br />
{% endblock %}
