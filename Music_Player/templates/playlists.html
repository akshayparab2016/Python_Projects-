{% extends "base.html" %} {% block content %}

<!-- Create Playlist Form -->
<form method="POST" action="{{ url_for('create_playlist') }}" class="mb-3">
  <input
    type="text"
    name="name"
    placeholder="New playlist name"
    class="form-control"
    required
  />
  <button class="btn btn-success mt-2">Create Playlist</button>
</form>

<br />
<h2>Your Playlists</h2>
<div class="list-group">
  {% for pl in playlists %}
  <div class="d-flex justify-content-between align-items-center">
    <a
      href="{{ url_for('playlist_detail', playlist_id=pl.id) }}"
      class="list-group-item list-group-item-action flex-grow-1"
      >{{ pl.name }}</a
    >
    <!-- Delete button -->
    <form
      method="POST"
      action="{{ url_for('delete_playlist', playlist_id=pl.id) }}"
      onsubmit="
        return confirm('Are you sure you want to delete this playlist?');
      "
    >
      <button type="submit" class="btn btn-danger ms-2">Delete</button>
    </form>
  </div>
  <br />
  {% endfor %}
</div>

{% endblock %}
