<!doctype html>
<html>
  <head>
    <title>🎵 Music Player</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('home') }}">🎵 Music Player</a>
        <div>
          {% if current_user.is_authenticated %}
          <a href="{{ url_for('playlists') }}" class="btn btn-outline-light"
            >Playlists</a
          >
          <a href="{{ url_for('logout') }}" class="btn btn-outline-light"
            >Logout</a
          >
          {% else %}
          <a href="{{ url_for('login') }}" class="btn btn-outline-light"
            >Login</a
          >
          <a href="{{ url_for('register') }}" class="btn btn-outline-light"
            >Register</a
          >
          {% endif %}
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      {% with messages = get_flashed_messages() %} {% if messages %} {% for
      message in messages %}
      <div class="alert alert-info alert-dismissible fade show">
        {{ message }}
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      {% endfor %} {% endif %} {% endwith %} {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", (event) => {
        setTimeout(() => {
          const alerts = document.querySelectorAll(".alert");
          alerts.forEach((alertElem) => {
            const alert = bootstrap.Alert.getOrCreateInstance(alertElem);
            alert.close();
          });
        }, 3000);
      });
    </script>
  </body>
</html>
